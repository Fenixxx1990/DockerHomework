version: '3.8'

services:
  # Nginx: запускается на каждой ноде кластера (Stateless)
  web:
    image: nginx:latest
    networks:
      - app-network
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  # Postgres: привязан к конкретной ноде (Stateful)
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    networks:
      - app-network
    volumes:
      - db_data:/var/lib/postgresql/data
    secrets:
      - db_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.storage == true
      restart_policy:
        condition: on-failure

networks:
  app-network:
    driver: overlay

configs:
  nginx_config:
    file: ./default.conf  # Исправлено: путь теперь соответствует твоему файлу

secrets:
  db_password:
    external: true  # Оставляем external, это безопасный стандарт для Git

volumes:
  db_data:
    driver: local