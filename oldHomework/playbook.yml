---
- name: Развертывание Nginx с локальными конфигами
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Проверка наличия локальных файлов
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/{{ item }}"
      register: file_check
      loop:
        - index.html
        - default.conf
      failed_when: not file_check.results[0].stat.exists or not file_check.results[1].stat.exists

    - name: Запуск контейнера Nginx
      community.docker.docker_container:
        name: nginx-custom
        image: nginx:latest
        state: started
        restart_policy: always
        published_ports:
          - "8081:80"
        volumes:
          # Монтируем файл index.html напрямую из папки с плейбуком
          - "{{ playbook_dir }}/index.html:/usr/share/nginx/html/index.html:ro"
          # Монтируем конфиг default.conf напрямую из папки с плейбуком
          - "{{ playbook_dir }}/default.conf:/etc/nginx/conf.d/default.conf:ro"