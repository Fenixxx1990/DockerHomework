version: '3.8'

services:
  # Nginx: по одному инстансу на каждую ноду кластера
  web:
    image: nginx:latest
    networks:
      - app-network
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    deploy:
      mode: global  # Запускает ровно по 1 контейнеру на каждой доступной ноде
      restart_policy:
        condition: on-failure

  # Postgres: Stateful-сервис с привязкой к конкретной ноде
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    networks:
      - app-network
    volumes:
      - db_data:/var/lib/postgresql/data
    secrets:
      - db_password
    deploy:
      replicas: 1
      placement:
        constraints:
          # Запускать только на ноде с меткой storage=true
          - node.labels.storage == true
      restart_policy:
        condition: on-failure

networks:
  app-network:
    driver: overlay  # Общая сеть для взаимодействия между нодами

configs:
  nginx_config:
    file: ./nginx.conf  # Файл должен лежать рядом с stack.yml

secrets:
  db_password:
    external: true  # Секрет должен быть создан заранее командой docker secret create

volumes:
  db_data:
    driver: local  # Данные будут храниться на той ноде, где запустится postgres